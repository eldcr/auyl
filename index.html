<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FOODOO · Полная система заказа | 12 поставщиков</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f7f2;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            padding: 1.5rem;
            color: #1c2e1f;
        }

        .main-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .brand {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .brand h1 {
            font-size: 2.4rem;
            background: linear-gradient(135deg, #2c5e2d, #6b8c42, #e0a822);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .supplier-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            justify-content: center;
            max-height: 200px;
            overflow-y: auto;
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: #e8ede2;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
            color: #2d4a2a;
        }

        .tab-btn.active {
            background: #2c7840;
            color: white;
        }

        .category-section {
            background: white;
            border-radius: 1.5rem;
            margin-bottom: 1.5rem;
            overflow: hidden;
            border: 1px solid #e2ecd9;
        }

        .category-header {
            background: #2a5930;
            color: white;
            padding: 0.7rem 1.2rem;
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.5rem;
            padding: 1rem;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.4rem;
            border-bottom: 1px dashed #dde6d4;
        }

        .item-name {
            font-weight: 500;
            font-size: 0.85rem;
            color: #1b3b1f;
            flex: 2;
            min-width: 140px;
        }

        .item-unit {
            background: #eef3e8;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            color: #3f6b3a;
            margin-left: 0.3rem;
        }

        .item-control {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: #fefcf5;
            padding: 0.15rem 0.6rem;
            border-radius: 40px;
            border: 1px solid #dde6cf;
        }

        .qty-input {
            width: 70px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.3rem 0;
            border: none;
            background: transparent;
            font-family: monospace;
        }

        .qty-input:focus {
            outline: none;
            border-bottom: 2px solid #5f8b4c;
        }

        .order-panel {
            background: #fefaf0;
            border-radius: 1.5rem;
            padding: 1rem 1.2rem;
            margin-top: 1rem;
            border: 1px solid #e0dac8;
        }

        .panel-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e5dcc8;
        }

        .panel-header h2 {
            font-size: 1.3rem;
            color: #2b532b;
        }

        .action-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .btn-primary {
            background: #3f7846;
            color: white;
        }

        .btn-secondary {
            background: #e0dbc9;
            color: #2e482a;
        }

        .copy-section {
            background: #2d3528;
            border-radius: 1.2rem;
            margin-top: 1rem;
            padding: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: stretch;
        }

        .copy-field {
            flex: 3;
            background: #1e241b;
            border-radius: 1rem;
            padding: 0.7rem;
            color: #f0f7e6;
            font-family: monospace;
            font-size: 0.7rem;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }

        .copy-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            justify-content: center;
        }

        .btn-copy {
            background: #7dab5b;
            color: white;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
        }

        .live-badge {
            background: #f1f2e6;
            font-size: 0.7rem;
            padding: 0.15rem 0.6rem;
            border-radius: 30px;
        }

        .order-summary-preview {
            background: #eef3e4;
            border-radius: 1rem;
            padding: 0.6rem 0.8rem;
            margin-bottom: 0.8rem;
            font-size: 0.75rem;
            max-height: 120px;
            overflow-y: auto;
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a1c;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            z-index: 1000;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            color: #8a9a7a;
            margin-top: 1rem;
        }

        @media (max-width: 680px) {
            body { padding: 0.8rem; }
            .items-grid { grid-template-columns: 1fr; }
            .copy-section { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="brand">
        <h1>🥩 FOODOO · Сводный заказ</h1>
        <p>12 поставщиков | Десятичные количества (0.3 кг, 1.5 л, 2 шт)</p>
    </div>

    <div class="supplier-tabs" id="supplierTabs"></div>
    <div id="catalogsContainer"></div>

    <div class="order-panel">
        <div class="panel-header">
            <h2>📋 Текущий заказ <span class="live-badge" id="itemCounterBadge">0 позиций</span></h2>
            <div class="action-group">
                <button class="btn btn-secondary" id="resetAllOrdersBtn">⟳ Сбросить всё</button>
            </div>
        </div>
        <div class="order-summary-preview" id="quickSummary">✨ нет выбранных товаров</div>
        <div class="copy-section">
            <div class="copy-field" id="copyTextField">// заказ будет здесь</div>
            <div class="copy-actions">
                <button class="btn-copy" id="copyTextBtn">📋 Копировать</button>
                <button class="btn-secondary" id="refreshCopyBtn">⟳ Обновить</button>
            </div>
        </div>
    </div>
    <footer>FOODOO — поддерживаются десятичные количества (например, 0.3 кг, 1.5 л)</footer>
</div>

<script>
    // ======================= ВСЕ ПОСТАВЩИКИ =======================
    const supplierCatalogs = {
        foodoo: { name: "FOODOO", categories: [
            { name: "🍅 Овощи", icon: "🍅", items: ["Помидоры розовые сладкие","Томаты красные","Черри красные","Черри желтые","Огурцы","Баклажан","Перец сладкий красный","Перец светофор"].map(i=>({name:i,unit:"кг"})) },
            { name: "🌿 Зелень", icon: "🌿", items: ["Базилик","Петрушка","Кинза","Укроп","Мята","Лук зеленый","Джусай","Чесночные стрелки","Стебель сельдерея"].map(i=>({name:i,unit:"кг"})) },
            { name: "🌶 Специи", icon: "🌶", items: ["Перец полугорький","Перец чили","Имбирь корень","Тмин","Розмарин"].map(i=>({name:i,unit:"кг"})) },
            { name: "🥕 Корнеплоды", icon: "🥕", items: ["Картофель крупный","Картофель бэби","Батат крупный","Морковь красная","Морковь желтая","Свекла","Редька"].map(i=>({name:i,unit:"кг"})) }
        ] },
        jandos: { name: "JAndso", categories: [
            { name: "🥩 Говядина", icon: "🥩", items: ["Мозговые кости","Вырезка говядина","Говядина кости Демик","Әсіп"].map(i=>({name:i,unit:"кг"})) },
            { name: "🐎 Конина", icon: "🐎", items: ["Конина суп набор","Казы классический","Жая конская"].map(i=>({name:i,unit:"кг"})) },
            { name: "🐑 Баранина", icon: "🐑", items: ["Шея ягненка","Баранина тушка"].map(i=>({name:i,unit:"кг"})) }
        ] },
        seragali: { name: "Seragali", categories: [
            { name: "🐑 Баранина", icon: "🐑", items: ["Мякоть баранины","Баранина коробка обваленная","Суп набор баран","Шея ягненка","Голень ягненка 600-700гр"].map(i=>({name:i,unit:i.includes("Голень")?"шт":"кг"})) },
            { name: "🐎 Конина", icon: "🐎", items: ["Щеки коня","Жая конская","Суп набор конина","Жир конский","Конина кишки","Конина коробка обваленная","Ребра конины на кости","Казы классический"].map(i=>({name:i,unit:"кг"})) },
            { name: "🥩 Говядина", icon: "🥩", items: ["Говядина кости демик","Вырезка говядина","Мозговые кости пиленные"].map(i=>({name:i,unit:"кг"})) }
        ] },
        dossco: { name: "Doss CO", categories: [
            { name: "🍿 Снеки", icon: "🍿", items: ["Чипсы Lays","Сухарики","Орешки","Попкорн","Семечки"].map(i=>({name:i,unit:"шт"})) },
            { name: "🥫 Консервы", icon: "🥫", items: ["Тушенка","Сайра","Кукуруза","Горошек","Оливки"].map(i=>({name:i,unit:"шт"})) },
            { name: "🥩 Мясо", icon: "🥩", items: ["Мозговые кости","Голень ягненка","Коробка ягненка","Коробка конины"].map(i=>({name:i,unit:"кг"})) }
        ] },
        foodhouse: { name: "FOOD HOUSE", categories: [
            { name: "🍫 Шоколад", icon: "🍫", items: ["Белый шоколад Callebaut №W2","Молочный шоколад Callebaut №823","Темный шоколад Callebaut №811","Какао масло Callebaut","Вафельная крошка Callebaut"].map(i=>({name:i,unit:"кг"})) },
            { name: "🥫 Соусы/ингредиенты", icon: "🥫", items: ["Шрирача","Желатин листовой","Сахар тростниковый","Моцарелла для пиццы 2.2","Уксус рисовый 20л","Соевый соус 20л","Миндальная мука","Ваниль стручки","Грибы белые С/М","Кунжут белый","Кунжут черный"].map(i=>({name:i,unit:i.includes("20л")?"л":"кг"})) }
        ] },
        kazbeef: { name: "KazBeef", categories: [
            { name: "🥩 Говядина", icon: "🥩", items: ["Стейк мясника","Мозговые кости"].map(i=>({name:i,unit:"кг"})) }
        ] },
        sweetpremium: { name: "Sweet Premium", categories: [
            { name: "🧈 Молочные", icon: "🧈", items: ["Сливочное масло 82%"].map(i=>({name:i,unit:"кг"})) }
        ] },
        metro: { name: "Metro", categories: [
            { name: "❄️ Минус", icon: "❄️", items: ["Шея говяжья kazbeef","Ребра говяжьи kazbeef","Спиной отруб kazbeef","Цыпленок Алель тушка","Шпинат C/M","Черная смородина С/М","Черника С/М"].map(i=>({name:i,unit:"кг"})) },
            { name: "📦 Сухой", icon: "📦", items: ["Мука ДаниНан 10 кг","Масло оливковое","Масло растительное","Соль морская мелкая","Аралтұз","Сахар песок 25кг","Сахарная Пудра","Сода пищевая","Крахмал кукурузный","Крахмал картофельный","Томат цинказ","Гранатовый сок","Кукуруза конс. Bonduelle","Уксус яблочный","Уксус 70%","Красный винный уксус","Дрожжи pakmaya","Халва"].map(i=>({name:i,unit:i.includes("сок")?"л":"кг"})) },
            { name: "👨‍🍳 Staff", icon: "👨‍🍳", items: ["Рис баракат","Лапша яичная Мия","Макароны витки","Гречка"].map(i=>({name:i,unit:"кг"})) },
            { name: "➕ Плюс", icon: "➕", items: ["Яйцо","Йогурт греческий","Фета белая","Сметана 20%","Сметана 25%","Сливки 33%","Молоко Laсtel","Креметта","Яблоки грин смит","Апельсин","Сливки масло President","Кефир"].map(i=>({name:i,unit:i==="Яйцо"?"шт":"кг"})) }
        ] },
        ayakaz: { name: "Аяказ", categories: [
            { name: "🌿 Зелень", icon: "🌿", items: ["Мини шпинат","Салат Ромейн","Батат"].map(i=>({name:i,unit:"кг"})) }
        ] },
        grillpro: { name: "Гриль ПРО", categories: [
            { name: "🔥 Угли", icon: "🔥", items: ["Угли камадо (1 коробка)"].map(i=>({name:i,unit:"коробка"})) }
        ] },
        preorder: { name: "Предзаказ", categories: [
            { name: "🐔 Мясо/рыба", icon: "🐔", items: ["Цыпленок 1,1-1,2кг","Форель радужная 300-350гр"].map(i=>({name:i,unit:i.includes("Цыпленок")?"кг":"шт"})) }
        ] },
        hozyain: { name: "Хозяйственные товары", categories: [
            { name: "🧹 Расходники", icon: "🧹", items: ["Шапки одноразовые","Стрейч","Бумага для выпечки","Алюминиевая фольга","Банки 0,5","Банки 1 л","Контейнеры 0,250","Кондитерские мешки","Антисептик 5л","Микрофибра","Вакуумный пакет 250х350","Вакуумный пакет 100х250","Вакуумный пакет 160х250","Вакуумный пакет 300х400","Боксы 0,5л","Боксы 1л","Боксы 0,250мл","Стикер ценник","Вафельное полотно"].map(i=>({name:i,unit:i.includes("Антисептик")?"л":"шт"})) }
        ] }
    };

    let orderMap = new Map();
    function getKey(supId, catIdx, itemIdx) { return `${supId}|${catIdx}|${itemIdx}`; }

    for (let [supId, sup] of Object.entries(supplierCatalogs)) {
        sup.categories.forEach((cat, ci) => cat.items.forEach((_, ii) => orderMap.set(getKey(supId, ci, ii), 0)));
    }

    let currentSupplier = "foodoo";
    const container = document.getElementById("catalogsContainer");
    const tabsContainer = document.getElementById("supplierTabs");

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    function renderTabs() {
        tabsContainer.innerHTML = "";
        for (let [id, sup] of Object.entries(supplierCatalogs)) {
            const btn = document.createElement("button");
            btn.className = `tab-btn ${currentSupplier === id ? "active" : ""}`;
            btn.textContent = sup.name;
            btn.dataset.supplier = id;
            btn.onclick = () => { currentSupplier = id; document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); renderCurrentSupplier(); };
            tabsContainer.appendChild(btn);
        }
    }

    function renderCurrentSupplier() {
        const sup = supplierCatalogs[currentSupplier];
        if (!sup) return;
        container.innerHTML = "";
        sup.categories.forEach((cat, catIdx) => {
            const section = document.createElement("div");
            section.className = "category-section";
            section.innerHTML = `<div class="category-header"><span>${cat.icon}</span> ${cat.name}</div><div class="items-grid"></div>`;
            const grid = section.querySelector(".items-grid");
            cat.items.forEach((item, itemIdx) => {
                const key = getKey(currentSupplier, catIdx, itemIdx);
                const qty = orderMap.get(key) || 0;
                const row = document.createElement("div");
                row.className = "item-row";
                row.innerHTML = `
                    <div class="item-name">${escapeHtml(item.name)} <span class="item-unit">${escapeHtml(item.unit)}</span></div>
                    <div class="item-control">
                        <input type="number" class="qty-input" step="0.1" value="${qty}" min="0" placeholder="0">
                    </div>
                `;
                const input = row.querySelector(".qty-input");
                input.addEventListener("input", (e) => {
                    let val = parseFloat(e.target.value);
                    if (isNaN(val) || val < 0) val = 0;
                    orderMap.set(key, val);
                    updateAllSummaries();
                });
                grid.appendChild(row);
            });
            container.appendChild(section);
        });
        updateAllSummaries();
    }

    function generateFullOrderText() {
        let lines = [`🍏 FOODOO · ЗАКАЗ ОТ ${new Date().toLocaleString('ru-RU')}`, "=================================================="];
        let hasAny = false, total = 0;
        for (let [supId, sup] of Object.entries(supplierCatalogs)) {
            let supLines = [];
            sup.categories.forEach((cat, ci) => cat.items.forEach((item, ii) => {
                const qty = orderMap.get(getKey(supId, ci, ii)) || 0;
                if (qty > 0) { hasAny = true; supLines.push(`   ${item.name} — ${qty} ${item.unit}`); total++; }
            }));
            if (supLines.length) lines.push(`\n📦 ${sup.name}`, ...supLines);
        }
        if (!hasAny) return "⏳ Нет заказанных позиций. Укажите количество (например, 0.3, 1.5)";
        lines.push(`\n——————————————————————————————————`, `✅ Всего позиций: ${total}`);
        return lines.join("\n");
    }

    function updateQuickSummary() {
        let totalItems = 0, html = "<strong>📦 выбранные товары:</strong><br>";
        for (let [supId, sup] of Object.entries(supplierCatalogs)) {
            let items = [];
            sup.categories.forEach((cat, ci) => cat.items.forEach((item, ii) => {
                const qty = orderMap.get(getKey(supId, ci, ii)) || 0;
                if (qty > 0) { totalItems++; items.push(`${escapeHtml(item.name)} ${qty}${item.unit}`); }
            }));
            if (items.length) html += `<div><b>${sup.name}</b>: ${items.join(", ")}</div>`;
        }
        document.getElementById("quickSummary").innerHTML = totalItems ? html : "✨ нет выбранных товаров";
        document.getElementById("itemCounterBadge").innerText = `${totalItems} позиций`;
    }

    function updateCopyField() { document.getElementById("copyTextField").innerText = generateFullOrderText(); }
    function updateAllSummaries() { updateQuickSummary(); updateCopyField(); }

    function resetAll() { for (let k of orderMap.keys()) orderMap.set(k, 0); renderCurrentSupplier(); updateAllSummaries(); showToast("🔄 Всё сброшено"); }
    async function copyText() {
        const txt = document.getElementById("copyTextField").innerText;
        if (txt.includes("Нет заказанных")) { showToast("⚠️ Нет товаров"); return; }
        try { await navigator.clipboard.writeText(txt); showToast("✅ Скопировано!"); } catch { alert(txt); }
    }
    function showToast(msg) {
        let t = document.querySelector(".toast-msg"); if (t) t.remove();
        let toast = document.createElement("div"); toast.className = "toast-msg"; toast.innerText = msg;
        document.body.appendChild(toast); setTimeout(() => toast.remove(), 2000);
    }

    document.getElementById("resetAllOrdersBtn").onclick = resetAll;
    document.getElementById("copyTextBtn").onclick = copyText;
    document.getElementById("refreshCopyBtn").onclick = () => { updateCopyField(); showToast("📄 Обновлено"); };

    renderTabs();
    renderCurrentSupplier();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Auyl Purchasing Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 1rem;
            color: #1a1a1a;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header - centered */
        .brand {
            text-align: center;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-container {
            display: flex;
            justify-content: center;
        }

        .logo-img {
            max-width: 48px;
            height: auto;
            border-radius: 8px;
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.3px;
        }

        .supplier-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #e5e5e5;
            padding-bottom: 0.75rem;
            justify-content: center;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: 0.15s;
            color: #666;
        }

        .tab-btn:hover {
            background: #f0f0f0;
            color: #1a1a1a;
        }

        .tab-btn.active {
            background: #1a1a1a;
            color: white;
        }

        .category-section {
            background: white;
            border-radius: 12px;
            margin-bottom: 1rem;
            overflow: hidden;
            border: 1px solid #eaeaea;
        }

        .category-header {
            background: white;
            color: #1a1a1a;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .category-header span:first-child {
            font-size: 1rem;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0;
            padding: 0;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f5f5f5;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-name {
            font-weight: 400;
            font-size: 0.875rem;
            color: #1a1a1a;
            flex: 2;
            min-width: 140px;
        }

        .item-unit {
            background: #f0f0f0;
            padding: 0.125rem 0.5rem;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 500;
            color: #666;
            margin-left: 0.5rem;
        }

        .item-control {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            background: #fafafa;
            padding: 0.125rem 0.25rem;
            border-radius: 32px;
            border: 1px solid #eaeaea;
        }

        .control-btn {
            background: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            color: #1a1a1a;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: #eaeaea;
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .qty-input {
            width: 65px;
            text-align: center;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.25rem 0;
            border: none;
            background: transparent;
            font-family: monospace;
        }

        .qty-input:focus {
            outline: none;
        }

        .order-panel {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
            border: 1px solid #eaeaea;
        }

        .panel-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .panel-header h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #1a1a1a;
        }

        .live-badge {
            background: #f0f0f0;
            font-size: 0.7rem;
            padding: 0.125rem 0.5rem;
            border-radius: 20px;
            font-weight: normal;
            margin-left: 0.5rem;
        }

        .action-group {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            border: none;
            padding: 0.375rem 0.875rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.1s;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #1a1a1a;
        }

        .btn-secondary:hover {
            background: #e5e5e5;
        }

        .order-summary-preview {
            background: #fafafa;
            border-radius: 10px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.75rem;
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid #f0f0f0;
            color: #555;
        }

        .copy-section {
            background: #fafafa;
            border-radius: 12px;
            margin-top: 1rem;
            overflow: hidden;
            border: 1px solid #eaeaea;
        }

        .copy-block {
            padding: 0.75rem;
            border-bottom: 1px solid #eaeaea;
        }

        .copy-block:last-child {
            border-bottom: none;
        }

        .copy-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .copy-header h3 {
            font-size: 0.8rem;
            font-weight: 600;
            color: #1a1a1a;
        }

        .copy-header h3 span {
            font-weight: normal;
            color: #888;
            font-size: 0.7rem;
        }

        .copy-field {
            background: white;
            border-radius: 8px;
            padding: 0.6rem;
            color: #1a1a1a;
            font-family: monospace;
            font-size: 0.7rem;
            white-space: pre-wrap;
            max-height: 140px;
            overflow-y: auto;
            margin-bottom: 0.5rem;
            border: 1px solid #eaeaea;
        }

        .copy-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .btn-copy {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .btn-copy-sm {
            background: #333;
        }

        .btn-copy:hover {
            background: #000;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #999;
            margin-top: 1.5rem;
            padding-top: 0.75rem;
            border-top: 1px solid #eaeaea;
        }

        .developer-credit {
            margin-top: 0.25rem;
        }

        .developer-credit a {
            color: #666;
            text-decoration: none;
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            z-index: 1000;
        }

        @media (max-width: 680px) {
            body { padding: 0.75rem; }
            .items-grid { grid-template-columns: 1fr; }
            .item-row { flex-direction: row; flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="brand">
        <div class="logo-container">
            <img src="logo.jpg" alt="Auyl Logo" class="logo-img" onerror="this.style.display='none'">
        </div>
        <h1>Auyl Purchasing Management</h1>
    </div>

    <div class="supplier-tabs" id="supplierTabs"></div>
    <div id="catalogsContainer"></div>

    <div class="order-panel">
        <div class="panel-header">
            <h2>Текущий заказ <span class="live-badge" id="itemCounterBadge">0 позиций</span></h2>
            <div class="action-group">
                <button class="btn btn-secondary" id="resetAllOrdersBtn">Сбросить всё</button>
            </div>
        </div>
        <div class="order-summary-preview" id="quickSummary">Нет выбранных товаров</div>

        <div class="copy-section">
            <div class="copy-block">
                <div class="copy-header">
                    <h3>Заказ для <span id="currentSupplierName">FOODOO</span> <span>(только этот поставщик)</span></h3>
                    <div class="copy-actions">
                        <button class="btn-copy btn-copy-sm" id="copyCurrentSupplierBtn">Копировать</button>
                        <button class="btn btn-secondary" id="refreshCurrentBtn" style="background:#e5e5e5;">Обновить</button>
                    </div>
                </div>
                <div class="copy-field" id="currentSupplierCopyField">// заказ для текущего поставщика</div>
            </div>
            <div class="copy-block">
                <div class="copy-header">
                    <h3>Общий заказ <span>(все поставщики)</span></h3>
                    <div class="copy-actions">
                        <button class="btn-copy" id="copyOverallBtn">Копировать</button>
                        <button class="btn btn-secondary" id="refreshOverallBtn">Обновить</button>
                    </div>
                </div>
                <div class="copy-field" id="overallCopyField">// общий заказ по всем поставщикам</div>
            </div>
        </div>
    </div>
    <footer>
        <div class="developer-credit">
            Yeldar Akimkhan · <a href="mailto:eldar@chef.net">eldar@chef.net</a>
        </div>
    </footer>
</div>

<script>
    // ============================================================
    // Auyl Purchasing Management — упрощенный формат заказа
    // Формат: Название поставщика, затем дата (завтрашняя), затем товары
    // ============================================================

    // функция для получения завтрашней даты в формате ДД.ММ.ГГГГ
    function getTomorrowDate() {
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const day = String(tomorrow.getDate()).padStart(2, '0');
        const month = String(tomorrow.getMonth() + 1).padStart(2, '0');
        const year = tomorrow.getFullYear();
        return `${day}.${month}.${year}`;
    }

    const supplierCatalogs = {

                { name: "Зелень", icon: "🌿", items: ["Базилик","Петрушка","Кинза","Укроп","Мята","Лук зеленый","Джусай","Чесночные стрелки","Стебель сельдерея"].map(i=>({name:i,unit:"кг"})) },
                { name: "Специи", icon: "🌶", items: ["Перец полугорький","Перец чили","Имбирь корень","Тмин","Розмарин"].map(i=>({name:i,unit:"кг"})) },
                { name: "Корнеплоды", icon: "🥕", items: ["Картофель крупный","Картофель бэби","Батат крупный","Морковь красная","Морковь желтая","Свекла","Редька"].map(i=>({name:i,unit:"кг"})) }
            ] 
        },
        jandos: { 
            name: "Jandos", 
            categories: [
                { name: "Говядина", icon: "🥩", items: ["Мозговые кости","Вырезка говядина","Говядина кости Демик","Әсіп"].map(i=>({name:i,unit:"кг"})) },
                { name: "Конина", icon: "🐎", items: ["Конина суп набор","Казы классический","Жая конская"].map(i=>({name:i,unit:"кг"})) },
                { name: "Баранина", icon: "🐑", items: ["Шея ягненка","Баранина тушка"].map(i=>({name:i,unit:"кг"})) }
            ] 
        },
        seragali: { 
            name: "Seragali", 
            categories: [
                { name: "Баранина", icon: "🐑", items: ["Мякоть баранины","Баранина коробка обваленная","Суп набор баран","Шея ягненка","Голень ягненка 600-700гр"].map(i=>({name:i,unit:i.includes("Голень")?"шт":"кг"})) },
                { name: "Конина", icon: "🐎", items: ["Щеки коня","Жая конская","Суп набор конина","Жир конский","Конина кишки","Конина коробка обваленная","Ребра конины на кости","Казы классический"].map(i=>({name:i,unit:"кг"})) },
                { name: "Говядина", icon: "🥩", items: ["Говядина кости демик","Вырезка говядина","Мозговые кости пиленные"].map(i=>({name:i,unit:"кг"})) }
            ] 
        },
        dossco: { 
            name: "Doss CO", 
            categories: [
                { name: "Мясо", icon: "🥩", items: ["Мозговые кости","Голень ягненка","Коробка ягненка","Коробка конины"].map(i=>({name:i,unit:"кг"})) }
            ] 
        },
        foodhouse: { 
            name: "FOOD HOUSE", 
            categories: [
                { name: "Шоколад", icon: "🍫", items: ["Белый шоколад Callebaut №W2","Молочный шоколад Callebaut №823","Темный шоколад Callebaut №811","Какао масло Callebaut","Вафельная крошка Callebaut"].map(i=>({name:i,unit:"кг"})) },
                { name: "Соусы и ингредиенты", icon: "🥫", items: ["Шрирача","Желатин листовой","Сахар тростниковый","Моцарелла для пиццы 2.2","Уксус рисовый 20л","Соевый соус 20л","Миндальная мука","Ваниль стручки","Грибы белые С/М","Кунжут белый","Кунжут черный"].map(i=>({name:i,unit:i.includes("20л")?"л":"кг"})) }
            ] 
        },
        kazbeef: { 
            name: "KazBeef", 
            categories: [
                { name: "Говядина", icon: "🥩", items: ["Стейк мясника","Мозговые кости"].map(i=>({name:i,unit:"кг"})) }
            ] 
        },
        sweetpremium: { 
            name: "Sweet Premium", 
            categories: [
                { name: "Молочные продукты", icon: "🧈", items: ["Сливочное масло 82%"].map(i=>({name:i,unit:"кг"})) }
            ] 
        },
        metro: { 
            name: "Metro", 
            categories: [
                { name: "Минус (заморозка)", icon: "❄️", items: ["Шея говяжья kazbeef","Ребра говяжьи kazbeef","Спиной отруб kazbeef","Цыпленок Алель тушка","Шпинат C/M","Черная смородина С/М","Черника С/М"].map(i=>({name:i,unit:"кг"})) },
                { name: "Сухой склад", icon: "📦", items: ["Мука ДаниНан 10 кг","Масло оливковое","Масло растительное","Соль морская мелкая","Аралтұз","Сахар песок 25кг","Сахарная Пудра","Сода пищевая","Крахмал кукурузный","Крахмал картофельный","Томат цинказ","Гранатовый сок","Кукуруза конс. Bonduelle","Уксус яблочный","Уксус 70%","Красный винный уксус","Дрожжи pakmaya","Халва"].map(i=>({name:i,unit:i.includes("сок")?"л":"кг"})) },
                { name: "Staff (кухня)", icon: "👨‍🍳", items: ["Рис баракат","Лапша яичная Мия","Макароны витки","Гречка"].map(i=>({name:i,unit:"кг"})) },
                { name: "Плюс (молочка/фрукты)", icon: "➕", items: ["Яйцо","Йогурт греческий","Фета белая","Сметана 20%","Сметана 25%","Сливки 33%","Молоко Laсtel","Креметта","Яблоки грин смит","Апельсин","Сливки масло President","Кефир"].map(i=>({name:i,unit:i==="Яйцо"?"шт":"кг"})) }
            ] 
        },
        ayakaz: { 
            name: "Аяказ", 
            categories: [
                { name: "Зелень", icon: "🌿", items: ["Мини шпинат","Салат Ромейн","Батат"].map(i=>({name:i,unit:"кг"})) }
            ] 
        },
        grillpro: { 
            name: "Гриль ПРО", 
            categories: [
                { name: "Угли", icon: "🔥", items: ["Угли камадо (1 коробка)"].map(i=>({name:i,unit:"коробка"})) }
            ] 
        },
        preorder: { 
            name: "Предзаказ", 
            categories: [
                { name: "Мясо и рыба", icon: "🐔", items: ["Цыпленок 1,1-1,2кг","Форель радужная 300-350гр"].map(i=>({name:i,unit:i.includes("Цыпленок")?"кг":"шт"})) }
            ] 
        },
        hozyain: { 
            name: "Хозяйственные товары", 
            categories: [
                { name: "Расходные материалы", icon: "🧹", items: ["Шапки одноразовые","Стрейч","Бумага для выпечки","Алюминиевая фольга","Банки 0,5","Банки 1 л","Контейнеры 0,250","Кондитерские мешки","Антисептик 5л","Микрофибра","Вакуумный пакет 250х350","Вакуумный пакет 100х250","Вакуумный пакет 160х250","Вакуумный пакет 300х400","Боксы 0,5л","Боксы 1л","Боксы 0,250мл","Стикер ценник","Вафельное полотно"].map(i=>({name:i,unit:i.includes("Антисептик")?"л":"шт"})) }
            ] 
        }
    };

    let orderMap = new Map();
    function getKey(supId, catIdx, itemIdx) { return `${supId}|${catIdx}|${itemIdx}`; }

    for (let [supId, sup] of Object.entries(supplierCatalogs)) {
        sup.categories.forEach((cat, ci) => cat.items.forEach((_, ii) => orderMap.set(getKey(supId, ci, ii), 0)));
    }

    let currentSupplier = "foodoo";
    const container = document.getElementById("catalogsContainer");
    const tabsContainer = document.getElementById("supplierTabs");

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }

    function renderTabs() {
        tabsContainer.innerHTML = "";
        for (let [id, sup] of Object.entries(supplierCatalogs)) {
            const btn = document.createElement("button");
            btn.className = `tab-btn ${currentSupplier === id ? "active" : ""}`;
            btn.textContent = sup.name;
            btn.dataset.supplier = id;
            btn.onclick = () => {
                currentSupplier = id;
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                document.getElementById("currentSupplierName").textContent = sup.name;
                renderCurrentSupplier();
            };
            tabsContainer.appendChild(btn);
        }
    }

    // НОВЫЙ ФОРМАТ ЗАКАЗА ДЛЯ ОДНОГО ПОСТАВЩИКА
    function generateSupplierOrderText(supplierId) {
        const sup = supplierCatalogs[supplierId];
        if (!sup) return "Поставщик не найден";
        
        const tomorrowDate = getTomorrowDate();
        let lines = [`${sup.name}`, `${tomorrowDate}`, `───────────────────────────────────`];
        let hasAny = false, totalItems = 0;
        
        sup.categories.forEach((cat, ci) => {
            cat.items.forEach((item, ii) => {
                const key = getKey(supplierId, ci, ii);
                const qty = orderMap.get(key) || 0;
                if (qty > 0) {
                    hasAny = true;
                    totalItems++;
                    lines.push(`   • ${item.name} — ${qty} ${item.unit}`);
                }
            });
        });
        
        if (!hasAny) return `Нет заказанных позиций для ${sup.name}`;
        
        lines.push(`───────────────────────────────────`);
        lines.push(`✅ Позиций: ${totalItems}`);
        return lines.join("\n");
    }

    // НОВЫЙ ФОРМАТ ОБЩЕГО ЗАКАЗА
    function generateOverallOrderText() {
        const tomorrowDate = getTomorrowDate();
        let lines = [`ОБЩИЙ ЗАКАЗ`, `${tomorrowDate}`, `───────────────────────────────────`];
        let hasAny = false, totalPositions = 0;
        
        for (let [supId, sup] of Object.entries(supplierCatalogs)) {
            let supLines = [];
            sup.categories.forEach((cat, ci) => {
                cat.items.forEach((item, ii) => {
                    const qty = orderMap.get(getKey(supId, ci, ii)) || 0;
                    if (qty > 0) {
                        hasAny = true;
                        totalPositions++;
                        supLines.push(`   • ${item.name} — ${qty} ${item.unit}`);
                    }
                });
            });
            if (supLines.length > 0) {
                lines.push(`\n📦 ${sup.name}`);
                lines.push(...supLines);
            }
        }
        
        if (!hasAny) return "Нет заказанных позиций";
        
        lines.push(`\n───────────────────────────────────`);
        lines.push(`✅ Всего позиций: ${totalPositions}`);
        return lines.join("\n");
    }

    function renderCurrentSupplier() {
        const sup = supplierCatalogs[currentSupplier];
        if (!sup) return;
        container.innerHTML = "";
        sup.categories.forEach((cat, catIdx) => {
            const section = document.createElement("div");
            section.className = "category-section";
            section.innerHTML = `<div class="category-header"><span>${cat.icon}</span> ${cat.name}</div><div class="items-grid"></div>`;
            const grid = section.querySelector(".items-grid");
            cat.items.forEach((item, itemIdx) => {
                const key = getKey(currentSupplier, catIdx, itemIdx);
                const qty = orderMap.get(key) || 0;
                const row = document.createElement("div");
                row.className = "item-row";
                
                const nameDiv = document.createElement("div");
                nameDiv.className = "item-name";
                nameDiv.innerHTML = `${escapeHtml(item.name)} <span class="item-unit">${escapeHtml(item.unit)}</span>`;
                
                const controlDiv = document.createElement("div");
                controlDiv.className = "item-control";
                
                const minusBtn = document.createElement("button");
                minusBtn.textContent = "−";
                minusBtn.className = "control-btn";
                minusBtn.type = "button";
                
                const input = document.createElement("input");
                input.type = "number";
                input.step = "0.1";
                input.value = qty;
                input.min = "0";
                input.className = "qty-input";
                
                const plusBtn = document.createElement("button");
                plusBtn.textContent = "+";
                plusBtn.className = "control-btn";
                plusBtn.type = "button";
                
                function setValue(val) {
                    let num = parseFloat(val);
                    if (isNaN(num) || num < 0) num = 0;
                    num = Math.round(num * 100) / 100;
                    input.value = num;
                    orderMap.set(key, num);
                    updateAllFields();
                }
                
                minusBtn.onclick = () => {
                    let current = parseFloat(input.value);
                    if (isNaN(current)) current = 0;
                    setValue(current - 1);
                };
                
                plusBtn.onclick = () => {
                    let current = parseFloat(input.value);
                    if (isNaN(current)) current = 0;
                    setValue(current + 1);
                };
                
                input.oninput = (e) => {
                    let val = parseFloat(e.target.value);
                    if (isNaN(val)) val = 0;
                    if (val < 0) val = 0;
                    val = Math.round(val * 100) / 100;
                    orderMap.set(key, val);
                    updateAllFields();
                    if (input.value != val) input.value = val;
                };
                
                controlDiv.appendChild(minusBtn);
                controlDiv.appendChild(input);
                controlDiv.appendChild(plusBtn);
                
                row.appendChild(nameDiv);
                row.appendChild(controlDiv);
                grid.appendChild(row);
            });
            container.appendChild(section);
        });
        updateAllFields();
    }

    function updateCurrentSupplierCopy() {
        const text = generateSupplierOrderText(currentSupplier);
        document.getElementById("currentSupplierCopyField").innerText = text;
    }

    function updateOverallCopy() {
        const text = generateOverallOrderText();
        document.getElementById("overallCopyField").innerText = text;
    }

    function updateQuickSummary() {
        let totalItems = 0;
        let html = ``;
        let hasOrders = false;
        
        for (let [supId, sup] of Object.entries(supplierCatalogs)) {
            let itemsList = [];
            sup.categories.forEach((cat, ci) => {
                cat.items.forEach((item, ii) => {
                    const qty = orderMap.get(getKey(supId, ci, ii)) || 0;
                    if (qty > 0) {
                        totalItems++;
                        hasOrders = true;
                        itemsList.push(`${escapeHtml(item.name)} ${qty}${item.unit}`);
                    }
                });
            });
            if (itemsList.length) {
                html += `<div><b>${escapeHtml(sup.name)}</b>: ${itemsList.join(", ")}</div>`;
            }
        }
        
        document.getElementById("quickSummary").innerHTML = hasOrders ? html : "Нет выбранных товаров";
        document.getElementById("itemCounterBadge").innerText = `${totalItems} позиций`;
    }

    function updateAllFields() {
        updateQuickSummary();
        updateCurrentSupplierCopy();
        updateOverallCopy();
    }

    function resetAllOrders() {
        for (let key of orderMap.keys()) orderMap.set(key, 0);
        renderCurrentSupplier();
        updateAllFields();
        showToast("Весь заказ очищен");
    }

    async function copyToClipboard(text, successMsg) {
        if (!text || text.includes("Нет заказанных")) {
            showToast("Нет товаров для копирования");
            return;
        }
        try {
            await navigator.clipboard.writeText(text);
            showToast(successMsg);
        } catch(err) {
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            showToast(successMsg);
        }
    }

    function copyCurrentSupplier() {
        const text = document.getElementById("currentSupplierCopyField").innerText;
        copyToClipboard(text, "Заказ поставщика скопирован");
    }

    function copyOverall() {
        const text = document.getElementById("overallCopyField").innerText;
        copyToClipboard(text, "Общий заказ скопирован");
    }

    function refreshCurrent() {
        updateCurrentSupplierCopy();
        showToast("Поле текущего поставщика обновлено");
    }

    function refreshOverall() {
        updateOverallCopy();
        showToast("Общее поле обновлено");
    }

    let toastTimeout = null;
    function showToast(msg) {
        const existing = document.querySelector(".toast-msg");
        if (existing) existing.remove();
        const toast = document.createElement("div");
        toast.className = "toast-msg";
        toast.innerText = msg;
        document.body.appendChild(toast);
        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.remove(), 2000);
    }

    document.getElementById("resetAllOrdersBtn").onclick = resetAllOrders;
    document.getElementById("copyCurrentSupplierBtn").onclick = copyCurrentSupplier;
    document.getElementById("copyOverallBtn").onclick = copyOverall;
    document.getElementById("refreshCurrentBtn").onclick = refreshCurrent;
    document.getElementById("refreshOverallBtn").onclick = refreshOverall;
    
    document.getElementById("currentSupplierName").textContent = supplierCatalogs[currentSupplier].name;
    renderTabs();
    renderCurrentSupplier();
</script>
</body>
</html>
